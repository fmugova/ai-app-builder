name: "Snyk Security Scan"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Monday 09:00 UTC — offset from CodeQL (08:00) to avoid concurrent billing
    - cron: "0 9 * * 1"

jobs:
  snyk:
    name: Snyk Dependency & Code Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk vulnerability scan
        # continue-on-error so the upload step always runs, even when Snyk
        # finds vulnerabilities (exit 1) or fails to authenticate (exit 2).
        # The SARIF file existence check below guards against the auth failure
        # case where the file is never written.
        continue-on-error: true
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # Only fail on high/critical; upload results either way
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        # Only upload when the SARIF file was actually produced.
        # 'always()' alone causes a hard failure when Snyk crashes before
        # writing the file (e.g. missing/invalid SNYK_TOKEN).
        if: always() && hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif
