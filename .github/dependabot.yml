version: 2
updates:
  # npm — group security fixes separately from routine dep bumps
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
      dev-dependencies:
        dependency-type: "development"
        patterns: ["*"]
    open-pull-requests-limit: 10

  # GitHub Actions — keep workflow actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
